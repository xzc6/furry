            background-color: #f0f2f5;
            padding: 15px;
            min-height: 100vh;
            overflow-x: hidden;

        .container {
            max-width: 1400px;

        }
        /* 标题链接样式 */
        h1 a {
            text-decoration: none;
            color: #1890ff;
        }
        h1 a:hover {

        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        /* 画廊网格：移动端适配 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 40px;
        }
        .gallery-item {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
            position: relative;
            cursor: pointer;
        }
        .gallery-item:hover {
            transform: translateY(-3px);
        }
        /* 图片卡片样式 */
        .thumbnail-wrapper {
            position: relative;
            width: 100%;
            padding-top: 75%;
            overflow: hidden;
        }
        .thumbnail-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }
        .anti-sniff-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 10;
            pointer-events: auto;
        }
        /* 视频卡片样式（支持双击全屏） */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9视频比例 */
            overflow: hidden;
            contain: layout style;
        }
        /* 视频下方画师名称链接样式 */
        .video-author-link {
            display: block;
            padding: 8px 12px;
            text-align: center;
            font-size: 0.8rem;
            color: #1890ff;
            text-decoration: none;
            background-color: #f8f9fa;
            transition: background-color 0.2s ease;
        }
        .video-author-link:hover {
            background-color: #e9ecef;
            color: #096dd9;
        }
        /* 画师名称样式（通用） */
        .artist-name {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.7rem;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        .gallery-item:hover .artist-name {
            opacity: 1;
        }
        /* 图片预览层 */
        #preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }
        #preview-container {
            position: relative;
            width: 95vw;
            height: 95vh;
            overflow: hidden;
        }
        #preview-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.1s ease;
        }
        #preview-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        /* 防打印样式 */
        @media print {
            body * {
                visibility: hidden !important;
            }
            body::before {
                content: "该页面受版权保护，禁止打印！" !important;
                visibility: visible !important;
                position: fixed;

                font-size: 24px;
                color: #ff4d4f;
                font-weight: bold;
                text-align: center;
                width: 100%;
            }
        }
    </style>

    <script>
        // 1. Base64解密函数
        function decodeBase64(str) {
            try {
                return decodeURIComponent(atob(str).split('').map(c => {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            } catch (e) {
                console.error('解码失败:', e);
                return '';
            }
        }

        // 2. 双击视频全屏功能
        function setupDoubleClickFullscreen() {
            const videoWrapper = document.querySelector('.video-wrapper');
            const iframe = document.getElementById('bili-player');

            if (videoWrapper && iframe) {
                videoWrapper.addEventListener('dblclick', function(e) {
                    e.preventDefault(); // 防止双击选中文字
                    if (!document.fullscreenElement) {
                        // 进入全屏
                        if (iframe.requestFullscreen) {
                            iframe.requestFullscreen();
                        } else if (iframe.webkitRequestFullscreen) { /* Safari */
                            iframe.webkitRequestFullscreen();
                        } else if (iframe.msRequestFullscreen) { /* IE11 */
                            iframe.msRequestFullscreen();
                        }
                    } else {
                        // 退出全屏
                        if (document.exitFullscreen) {
                            document.exitFullscreen();
                        } else if (document.webkitExitFullscreen) { /* Safari */
                            document.webkitExitFullscreen();
                        } else if (document.msExitFullscreen) { /* IE11 */
                            document.msExitFullscreen();
                        }
                    }
                });
            }
        }

        // 3. 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            const galleryItems = document.querySelectorAll('.gallery-item');
            const previewOverlay = document.getElementById('preview-overlay');
            const previewImage = document.getElementById('preview-image');
            const previewContainer = document.getElementById('preview-container');

            // 初始化图片
            galleryItems.forEach(item => {
                if (item.hasAttribute('data-image')) {
                    const decryptedUrl = decodeBase64(item.getAttribute('data-image'));
                    item.querySelector('.thumbnail-bg').style.backgroundImage = `url(${decryptedUrl})`;
                    
                    // 图片点击预览
                    item.querySelector('.anti-sniff-mask').addEventListener('click', function() {
                        previewImage.src = decryptedUrl;
                        previewImage.style.transform = 'translate(-50%, -50%) scale(1)';
                        previewOverlay.classList.add('active');
                        document.body.style.overflow = 'hidden';
                    });
                }
            });

            // 初始化双击全屏功能
            setupDoubleClickFullscreen();

            // 4. 预览层关闭逻辑
            previewOverlay.addEventListener('click', function(e) {
                if (e.target === previewOverlay || e.target === previewContainer) {
                    this.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });

            // ESC键关闭
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && previewOverlay.classList.contains('active')) {
                    previewOverlay.classList.remove('active');
                    document.body.style.overflow = '';
                }

                // 快捷键防护
                if ((e.ctrlKey && e.key === 'p') || (e.ctrlKey && e.key === 's') || e.key === 'F12') {
                    e.preventDefault();
                }
            });

            // 5. 移动端触摸缩放与拖动逻辑
            let isDragging = false;
            let startX, startY;
            let imgX = 0, imgY = 0;
            let scale = 1;
            let prevScale = 1;
            let touchDistance = 0;

            function getTouchDistance(touches) {
                const x = touches[0].clientX - touches[1].clientX;
                const y = touches[0].clientY - touches[1].clientY;
                return Math.sqrt(x * x + y * y);
            }

            function getTouchCenter(touches) {
                return {
                    x: (touches[0].clientX + touches[1].clientX) / 2,
                    y: (touches[0].clientY + touches[1].clientY) / 2
                };
            }

            previewContainer.addEventListener('touchstart', function(e) {
                if (e.touches.length === 1) {
                    isDragging = true;
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                } else if (e.touches.length === 2) {
                    touchDistance = getTouchDistance(e.touches);
                    prevScale = scale;
                }
                e.stopPropagation();
            });

            previewContainer.addEventListener('touchmove', function(e) {
                if (e.touches.length === 1 && isDragging && scale > 1) {
                    const dx = e.touches[0].clientX - startX;
                    const dy = e.touches[0].clientY - startY;
                    imgX += dx;
                    imgY += dy;
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    
                    previewImage.style.transform = `translate(-50%, -50%) translate(${imgX}px, ${imgY}px) scale(${scale})`;
                } else if (e.touches.length === 2) {
                    const newDistance = getTouchDistance(e.touches);
                    scale = prevScale * (newDistance / touchDistance);
                    scale = Math.max(1, Math.min(3, scale));
                    
                    previewImage.style.transform = `translate(-50%, -50%) scale(${scale})`;
                }
                e.stopPropagation();
            });

            previewContainer.addEventListener('touchend', function() {
                isDragging = false;
                if (scale <= 1) {
                    imgX = 0;
                    imgY = 0;
                }
            });

            // 6. 基础防护
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('selectstart', e => e.preventDefault());
            window.addEventListener('beforeprint', function(e) {
                e.preventDefault();
                window.print = function() {};
            });
        });
    </script>
